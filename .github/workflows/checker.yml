name: Username Checker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/2 * * * *"

jobs:
  run-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install requests

      - name: Run Checker
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          # Optional: add GITHUB_TOKEN only if you need it for something else
          # GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python stat.py

      # This step runs even if the python script hits sys.exit() or fails
      - name: Trigger new run (only when rate-limited or job ends)
        if: always()
        run: |
          echo "Current run finished → triggering a new one"
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow }}/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'
