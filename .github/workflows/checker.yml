name: Checker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/2 * * * *"

permissions:
  actions: write          # ← This is the key line needed for workflow_dispatch trigger
  contents: read          # Usually already implicit, but good to have for checkout

jobs:
  run-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install requests

      - name: Run Checker
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: python stat.py

      - name: Trigger new run
        if: always()
        run: |
          echo "Current run finished → triggering a new one"
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow_ref }}/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'
